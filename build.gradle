plugins {
    id 'net.neoforged.moddev' version '1.0.21'
}

version = '1.0.0'
group = 'com.example.mymod'
base { archivesName = 'PvPClientMod-1.21.4' }

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    version = '21.4.147'
    
    mods {
        mymod {
            sourceSet sourceSets.main
        }
    }
}

sourceSets.main.resources { srcDir 'src/main/resources' }

repositories {
    mavenCentral()
}

// Этот блок принудительно записывает метаданные мода при сборке JAR
jar {
    manifest {
        attributes([
            "Specification-Title"     : "mymod",
            "Specification-Vendor"    : "shadowakkplat-code",
            "Specification-Version"   : "1",
            "Implementation-Title"    : "My PvP Mod",
            "Implementation-Version"  : "1.0.0",
            "Implementation-Vendor"   : "shadowakkplat-code",
            "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }
}

tasks.withType(ProcessResources).configureEach {
    duplicatesStrategy = DuplicatesStrategy.INCLUDE
}
