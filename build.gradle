buildscript {
    repositories {
        maven { url = 'https://maven.minecraftforge.net/' }
        mavenCentral()
    }
    dependencies {
        // Правильное название плагина для современных версий Forge
        classpath group: 'net.minecraftforge.gradle', name: 'forge', version: '6.1.3'
    }
}

apply plugin: 'net.minecraftforge.gradle'
apply plugin: 'eclipse'
apply plugin: 'idea'

version = '1.0.0'
group = 'com.example.mymod'
archivesBaseName = 'mymod'

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

minecraft {
    // Официальные маппинги для версии 1.21.4
    mappings channel: 'official', version: '1.21.4'
}

sourceSets.main.resources { srcDir 'src/main/resources' }

repositories {
    maven { name = 'Forge'; url = 'https://maven.minecraftforge.net/' }
    mavenCentral()
}

dependencies {
    // Самая стабильная версия Forge для 1.21.4
    minecraft 'net.minecraftforge:forge:1.21.4-54.0.1'
}
