buildscript {
    repositories {
        maven { url = 'https://minecraftforge.net' }
        mavenCentral()
    }
    dependencies {
        classpath group: 'net.minecraftforge.gradle', name: 'ForgeGradle', version: '6.0.+', changing: true
    }
}

plugins {
    id 'eclipse'
    id 'idea'
}
apply plugin: 'net.minecraftforge.gradle'

version = '1.0.0'
group = 'com.example.mymod'
archivesBaseName = 'mymod'

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

minecraft {
    mappings channel: 'official', version: '1.21.4'
}

sourceSets.main.resources { srcDir 'src/main/resources' }

repositories {
    maven { name = 'Forge'; url = 'https://minecraftforge.net/' }
    mavenCentral()
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.21.4-54.0.1'
}
