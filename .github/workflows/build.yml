name: Build Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build with Gradle
        run: gradle jar -Dplugin.maven.url=https://minecraftforge.net
      - name: Upload Mod Jar
        uses: actions/upload-artifact@v4
        with:
          name: MyClientMod
          path: build/libs/*.jar
