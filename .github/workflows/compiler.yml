name: NeoForge Compiler
on:
  push:
  workflow_dispatch:

jobs:
  compile_jar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle Build Environment
        uses: gradle/actions/setup-gradle@v4

      - name: Compile PvP Client Jar
        run: gradle build
